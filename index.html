<head>

<body>
    <div class="container">
        <!-- Main Form Card -->

            <div class="header">
                <div class="badge">✨ Premium</div>
                <h1>
                    <span class="icon">🚀</span> 
                    <span>Smart Form</span>
                    <small>v2.0</small>
                </h1>
                <p class="subhead">🌟 All fields are required • Real-time validation</p>
            </div>

            <form id="mainForm" novalidate>
                <!-- Personal Information Section -->
                <div class="section-title">
                    <span>👤</span> Personal Information
                    <div class="section-line"></div>
                </div>

                <!-- Full Name -->
                <div class="form-group">
                    <div class="label-row">
                        <label for="fullName">Full Name <span class="required-star">*</span></label>
                        <span class="char-count" id="nameCount">0/50</span>
                    </div>
                    <input type="text" id="fullName" placeholder="Enter your full name" maxlength="50" />
                    <div id="nameMessage" class="message hidden"></div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address <span class="required-star">*</span></label>
                    <input type="email" id="email" placeholder="your.email@example.com" />
                    <div id="emailMessage" class="message hidden"></div>
                </div>

                <!-- Phone & Age -->
                <div class="inline-group">
                    <div class="form-group">
                        <label for="phone">Phone Number <span class="required-star">*</span></label>
                        <input type="tel" id="phone" placeholder="(123) 456-7890" />
                        <div id="phoneMessage" class="message hidden"></div>
                    </div>
                    <div class="form-group">
                        <label for="age">Age <span class="required-star">*</span></label>
                        <input type="number" id="age" placeholder="18+" min="1" max="120" />
                        <div id="ageMessage" class="message hidden"></div>
                    </div>
                </div>

                    <div class="section-line"></div>

                    <label for="subject">Subject <span class="required-star">*</span></label>

                        <option value="">Select a subject</option>
                        <option value="inquiry">📝 General Inquiry</option>
                        <option value="support">🛠️ Technical Support</option>
                        <option value="feedback">💬 Feedback & Suggestions</option>
                        <option value="sales">💰 Sales & Pricing</option>
                        <option value="careers">👔 Careers & Jobs</option>
                        <option value="partnership">🤝 Partnership</option>
                        <option value="press">📰 Press & Media</option>
                        <option value="other">📌 Other</option>
                    </select>
                    <div id="subjectMessage" class="message hidden"></div>
                </div>

                <div class="section-title" style="margin-top: 1.8rem;">
                    <span>💬</span> Your Message
                    <div class="section-line"></div>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="message">Message <span class="required-star">*</span></label>
                        <span class="char-count" id="msgCount">0/500</span>
                    </div>
                    <textarea id="message" placeholder="Write your detailed message here..." maxlength="500"></textarea>
                    <div id="messageTextMessage" class="message hidden"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn">
                    <span class="btn-icon">🚀</span> 
                    <span>Submit Form</span>
                    <span class="btn-shine"></span>
                </button>

                <div class="form-footer">
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                        <span class="progress-text" id="progressText">0%</span>
                    </div>
                    <span id="formStatus" class="status-badge">✨ Ready</span>
                </div>

        <!-- Data Panel -->

            <div class="panel-header">
                <h3>
                    <span class="icon">📊</span> 
                    <span>Submitted Data</span>
                    <span class="count-badge" id="dataCount">0</span>
                </h3>
                <button class="clear-btn" id="clearDataBtn">
                    <span>🗑️</span> Clear
                </button>
            </div>
            <div class="panel-body" id="panelBody">
                <div class="empty-state">
                    <span class="empty-icon">📭</span>
                    <p>No data submitted yet</p>
                    <small>Fill the form and click Submit</small>
                </div>
            </div>
